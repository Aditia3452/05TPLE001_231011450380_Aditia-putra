<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Mahasiswa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #16223F;
    --navy-deep: #0E1730;
    --gold: #C9A227;
    --gold-light: #E8D48A;
    --cream: #F6F3EA;
    --paper: #FFFFFF;
    --ink: #1E2430;
    --slate: #5B6472;
    --line: #E3DECD;
    --danger: #A83232;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    background:
      radial-gradient(circle at 8% 5%, rgba(201,162,39,0.35), transparent 42%),
      radial-gradient(circle at 92% 0%, rgba(123,79,161,0.28), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(46,95,168,0.30), transparent 45%),
      radial-gradient(circle at 5% 90%, rgba(168,50,50,0.20), transparent 40%),
      linear-gradient(160deg, #1B2A4A 0%, #16223F 45%, #0E1730 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Public Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .wrap{
    max-width: 1080px;
    margin: 0 auto;
  }

  /* ===== Letterhead ===== */
  .letterhead{
    display: flex;
    align-items: center;
    gap: 18px;
    border-bottom: 3px solid var(--gold);
    padding-bottom: 20px;
    margin-bottom: 36px;
  }
  .seal{
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--navy-deep);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-light);
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .letterhead h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
    color: #FFFFFF;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }
  .letterhead p{
    margin: 0;
    color: var(--gold-light);
    font-size: 14px;
    letter-spacing: 0.3px;
  }

  /* ===== Layout ===== */
  .grid{
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 820px){
    .grid{ grid-template-columns: 1fr; }
  }

  /* ===== Form card ===== */
  .form-card{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 26px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before{
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(
      90deg,
      var(--gold) 0 18px,
      var(--navy) 18px 36px
    );
  }
  .form-card h2{
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 600;
    margin: 8px 0 22px;
    color: var(--navy-deep);
  }
  .field{
    margin-bottom: 18px;
  }
  .field label{
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--slate);
    margin-bottom: 6px;
  }
  .field input, .field select{
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: var(--cream);
    font-family: 'Public Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input#nim{
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }
  .field input:focus, .field select:focus{
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(22,34,63,0.1);
    background: var(--paper);
  }
  .field .err{
    display: none;
    color: var(--danger);
    font-size: 12.5px;
    margin-top: 5px;
  }
  .field.invalid input, .field.invalid select{
    border-color: var(--danger);
  }
  .field.invalid .err{ display: block; }

  .btn-row{
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  button{
    font-family: 'Public Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    padding: 12px 18px;
    transition: transform 0.1s, background 0.15s;
  }
  button:active{ transform: scale(0.98); }
  .btn-primary{
    flex: 1;
    background: var(--navy);
    color: var(--gold-light);
  }
  .btn-primary:hover{ background: var(--navy-deep); }
  .btn-ghost{
    background: transparent;
    color: var(--slate);
    border: 1.5px solid var(--line);
  }
  .btn-ghost:hover{ border-color: var(--slate); color: var(--ink); }

  /* ===== List side ===== */
  .list-head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .list-head h2{
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 600;
    color: #FFFFFF;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    margin: 0;
  }
  .count-pill{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    background: var(--navy);
    color: var(--gold-light);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 10px;
  }
  .search{
    flex: 1;
    max-width: 240px;
    min-width: 160px;
    padding: 9px 13px;
    border: 1.5px solid var(--line);
    border-radius: 20px;
    background: var(--paper);
    font-size: 14px;
    outline: none;
  }
  .search:focus{ border-color: var(--navy); }

  .cards{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .empty{
    grid-column: 1 / -1;
    text-align: center;
    padding: 50px 20px;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    color: var(--slate);
  }
  .empty .big{
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--navy-deep);
    margin-bottom: 6px;
  }

  /* Student ID card */
  .mcard{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    position: relative;
    border-left: 6px solid var(--fak-color, var(--gold));
  }
  .mcard .top{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .mcard .nim{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--slate);
    letter-spacing: 0.5px;
  }
  .mcard .nama{
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--navy-deep);
    margin: 4px 0 10px;
    line-height: 1.25;
  }
  .mcard .meta{
    font-size: 13.5px;
    color: var(--slate);
    line-height: 1.6;
  }
  .mcard .meta b{
    color: var(--ink);
    font-weight: 600;
  }
  .mcard .actions{
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .mcard .actions button{
    padding: 6px 12px;
    font-size: 12.5px;
    border-radius: 6px;
  }
  .icon-edit{ background: var(--cream); color: var(--navy-deep); }
  .icon-edit:hover{ background: var(--gold-light); }
  .icon-del{ background: var(--cream); color: var(--danger); }
  .icon-del:hover{ background: #F3DCDC; }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy-deep);
    color: var(--gold-light);
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 10;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="letterhead">
    <div class="seal">DM</div>
    <div>
      <h1>Data Mahasiswa</h1>
      <p>Formulir pendaftaran &amp; direktori mahasiswa</p>
    </div>
  </div>

  <div class="grid">

    <!-- FORM -->
    <div class="form-card">
      <h2 id="form-title">Tambah mahasiswa</h2>
      <form id="student-form" novalidate>
        <div class="field" id="field-nim">
          <label for="nim">NIM</label>
          <input type="text" id="nim" placeholder="Contoh: 2210511234" autocomplete="off">
          <div class="err">NIM wajib diisi, angka saja.</div>
        </div>
        <div class="field" id="field-nama">
          <label for="nama">Nama lengkap</label>
          <input type="text" id="nama" placeholder="Contoh: Siti Amelia Putri" autocomplete="off">
          <div class="err">Nama wajib diisi.</div>
        </div>
        <div class="field" id="field-jurusan">
          <label for="jurusan">Jurusan / program studi</label>
          <input type="text" id="jurusan" placeholder="Contoh: Teknik Informatika" autocomplete="off">
          <div class="err">Jurusan wajib diisi.</div>
        </div>
        <div class="field" id="field-fakultas">
          <label for="fakultas">Fakultas</label>
          <select id="fakultas">
            <option value="">Pilih fakultas</option>
            <option>Teknik</option>
            <option>Ekonomi dan Bisnis</option>
            <option>Hukum</option>
            <option>Kedokteran</option>
            <option>Ilmu Komputer</option>
            <option>Ilmu Sosial dan Ilmu Politik</option>
            <option>Pertanian</option>
            <option>Psikologi</option>
            <option>Lainnya</option>
          </select>
          <div class="err">Silakan pilih fakultas.</div>
        </div>

        <div class="btn-row">
          <button type="submit" class="btn-primary" id="submit-btn">Simpan data</button>
          <button type="button" class="btn-ghost" id="cancel-edit" style="display:none;">Batal</button>
        </div>
      </form>
    </div>

    <!-- LIST -->
    <div>
      <div class="list-head">
        <h2>Direktori<span class="count-pill" id="count-pill">0</span></h2>
        <input type="text" class="search" id="search" placeholder="Cari nama atau NIM...">
      </div>
      <div class="cards" id="cards"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORAGE_KEY = 'data-mahasiswa-v1';

  const facultyColors = {
    'Teknik': '#C9A227',
    'Ekonomi dan Bisnis': '#2E7D5B',
    'Hukum': '#8A4B2A',
    'Kedokteran': '#A83232',
    'Ilmu Komputer': '#2E5FA8',
    'Ilmu Sosial dan Ilmu Politik': '#7B4FA1',
    'Pertanian': '#5A8F3C',
    'Psikologi': '#B5762E',
    'Lainnya': '#5B6472'
  };

  let students = [];
  let editingId = null;

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      students = raw ? JSON.parse(raw) : [];
    }catch(e){
      students = [];
    }
  }

  function save(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
    }catch(e){}
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function initials(name){
    return name.trim().split(/\s+/).slice(0,2).map(w => w[0] || '').join('').toUpperCase();
  }

  function render(){
    const cardsEl = document.getElementById('cards');
    const query = document.getElementById('search').value.trim().toLowerCase();

    const filtered = students.filter(s =>
      s.nama.toLowerCase().includes(query) || s.nim.toLowerCase().includes(query)
    );

    document.getElementById('count-pill').textContent = students.length;

    if (filtered.length === 0){
      cardsEl.innerHTML = `
        <div class="empty">
          <div class="big">${students.length === 0 ? 'Belum ada mahasiswa terdaftar' : 'Tidak ditemukan'}</div>
          <div>${students.length === 0 ? 'Isi formulir di samping untuk menambahkan data pertama.' : 'Coba kata kunci pencarian lain.'}</div>
        </div>`;
      return;
    }

    cardsEl.innerHTML = filtered.map(s => `
      <div class="mcard" style="--fak-color:${facultyColors[s.fakultas] || '#C9A227'}">
        <div class="top">
          <div>
            <div class="nim">${escapeHtml(s.nim)}</div>
            <div class="nama">${escapeHtml(s.nama)}</div>
          </div>
        </div>
        <div class="meta">
          <div><b>Jurusan:</b> ${escapeHtml(s.jurusan)}</div>
          <div><b>Fakultas:</b> ${escapeHtml(s.fakultas)}</div>
        </div>
        <div class="actions">
          <button class="icon-edit" onclick="window.__editStudent('${s.id}')">Ubah</button>
          <button class="icon-del" onclick="window.__deleteStudent('${s.id}')">Hapus</button>
        </div>
      </div>
    `).join('');
  }

  function setFieldError(fieldId, invalid){
    const el = document.getElementById('field-' + fieldId);
    el.classList.toggle('invalid', invalid);
  }

  function validate(nim, nama, jurusan, fakultas){
    let ok = true;
    if (!nim || !/^[0-9]+$/.test(nim)){ setFieldError('nim', true); ok = false; } else setFieldError('nim', false);
    if (!nama){ setFieldError('nama', true); ok = false; } else setFieldError('nama', false);
    if (!jurusan){ setFieldError('jurusan', true); ok = false; } else setFieldError('jurusan', false);
    if (!fakultas){ setFieldError('fakultas', true); ok = false; } else setFieldError('fakultas', false);
    return ok;
  }

  function resetForm(){
    document.getElementById('student-form').reset();
    ['nim','nama','jurusan','fakultas'].forEach(f => setFieldError(f, false));
    editingId = null;
    document.getElementById('form-title').textContent = 'Tambah mahasiswa';
    document.getElementById('submit-btn').textContent = 'Simpan data';
    document.getElementById('cancel-edit').style.display = 'none';
  }

  document.getElementById('student-form').addEventListener('submit', function(e){
    e.preventDefault();
    const nim = document.getElementById('nim').value.trim();
    const nama = document.getElementById('nama').value.trim();
    const jurusan = document.getElementById('jurusan').value.trim();
    const fakultas = document.getElementById('fakultas').value;

    if (!validate(nim, nama, jurusan, fakultas)) return;

    if (editingId){
      const idx = students.findIndex(s => s.id === editingId);
      if (idx !== -1){
        students[idx] = { id: editingId, nim, nama, jurusan, fakultas };
        showToast('Data mahasiswa diperbarui');
      }
    } else {
      if (students.some(s => s.nim === nim)){
        setFieldError('nim', true);
        document.querySelector('#field-nim .err').textContent = 'NIM ini sudah terdaftar.';
        return;
      }
      students.unshift({ id: Date.now().toString(36), nim, nama, jurusan, fakultas });
      showToast('Mahasiswa baru ditambahkan');
    }

    save();
    resetForm();
    render();
  });

  document.getElementById('cancel-edit').addEventListener('click', resetForm);

  document.getElementById('search').addEventListener('input', render);

  window.__editStudent = function(id){
    const s = students.find(x => x.id === id);
    if (!s) return;
    document.getElementById('nim').value = s.nim;
    document.getElementById('nama').value = s.nama;
    document.getElementById('jurusan').value = s.jurusan;
    document.getElementById('fakultas').value = s.fakultas;
    editingId = id;
    document.getElementById('form-title').textContent = 'Ubah data mahasiswa';
    document.getElementById('submit-btn').textContent = 'Perbarui data';
    document.getElementById('cancel-edit').style.display = 'inline-block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.__deleteStudent = function(id){
    const s = students.find(x => x.id === id);
    if (!s) return;
    if (!confirm(`Hapus data ${s.nama}?`)) return;
    students = students.filter(x => x.id !== id);
    save();
    if (editingId === id) resetForm();
    render();
    showToast('Data mahasiswa dihapus');
  };

  load();
  render();
})();
</script>

</body>
</html>
